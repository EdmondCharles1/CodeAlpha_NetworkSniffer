<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetScope — Network Sniffer</title>
    <style>
      /* ---- Variables de couleur ---- */
      :root {
        --bg: #0a0e17;
        --card: #161f33;
        --border: #1e2d4a;
        --text: #e2e8f0;
        --muted: #556178;
        --cyan: #22d3ee;
        --blue: #60a5fa;
        --green: #34d399;
        --yellow: #fbbf24;
        --purple: #a78bfa;
        --red: #f87171;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Courier New", monospace;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* ---- Header ---- */
      header {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      header h1 {
        font-size: 20px;
      }
      header h1 span {
        color: var(--cyan);
      }

      .status {
        font-size: 12px;
        padding: 6px 12px;
        border: 1px solid var(--border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--green);
        animation: pulse 1.5s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      /* ---- Stats ---- */
      .stats {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 12px;
        padding: 20px 24px;
      }

      .stat-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }

      .stat-label {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--muted);
        margin-bottom: 6px;
      }

      .stat-value {
        font-size: 26px;
        font-weight: bold;
      }

      /* ---- Filtres ---- */
      .filters {
        padding: 0 24px 16px;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .filter-btn {
        font-family: "Courier New", monospace;
        font-size: 12px;
        font-weight: bold;
        padding: 6px 14px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
      }

      .filter-btn:hover {
        color: var(--text);
        border-color: var(--text);
      }
      .filter-btn.active {
        background: var(--cyan);
        color: var(--bg);
        border-color: var(--cyan);
      }

      .separator {
        width: 1px;
        height: 20px;
        background: var(--border);
        margin: 0 4px;
      }

      /* ---- Graphique (barres simples) ---- */
      .chart-section {
        padding: 0 24px 16px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .chart-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }

      .chart-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--muted);
        margin-bottom: 12px;
      }

      .bar-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 8px;
      }

      .bar-label {
        width: 50px;
        font-size: 12px;
        text-align: right;
      }
      .bar-track {
        flex: 1;
        height: 20px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 4px;
        overflow: hidden;
      }
      .bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s;
      }
      .bar-count {
        width: 50px;
        font-size: 12px;
        color: var(--muted);
      }

      /* Top IPs */
      .ip-row {
        display: flex;
        justify-content: space-between;
        padding: 4px 0;
        font-size: 13px;
      }
      .ip-count {
        color: var(--cyan);
      }

      /* ---- Tableau ---- */
      .table-container {
        padding: 0 24px 24px;
      }

      .table-wrap {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow: hidden;
        max-height: 400px;
        overflow-y: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 12px;
      }

      th {
        text-align: left;
        padding: 10px 12px;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: var(--card);
      }

      td {
        padding: 8px 12px;
        border-bottom: 1px solid rgba(30, 45, 74, 0.4);
      }

      tr:hover {
        background: rgba(34, 211, 238, 0.05);
      }

      .tag {
        font-size: 10px;
        font-weight: bold;
        padding: 2px 8px;
        border-radius: 4px;
      }

      .tag-TCP {
        background: rgba(96, 165, 250, 0.15);
        color: var(--blue);
      }
      .tag-UDP {
        background: rgba(52, 211, 153, 0.15);
        color: var(--green);
      }
      .tag-ICMP {
        background: rgba(251, 191, 36, 0.15);
        color: var(--yellow);
      }
      .tag-OTHER {
        background: rgba(167, 139, 250, 0.15);
        color: var(--purple);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>Net<span>Scope</span></h1>
      <div class="status">
        <div class="dot"></div>
        <span>CAPTURING</span>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal" style="color: var(--cyan)">
          0
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TCP</div>
        <div class="stat-value" id="statTcp" style="color: var(--blue)">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">UDP</div>
        <div class="stat-value" id="statUdp" style="color: var(--green)">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ICMP</div>
        <div class="stat-value" id="statIcmp" style="color: var(--yellow)">
          0
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Other</div>
        <div class="stat-value" id="statOther" style="color: var(--purple)">
          0
        </div>
      </div>
    </div>

    <!-- Filtres + Export -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter(this, 'ALL')">
        ALL
      </button>
      <button class="filter-btn" onclick="setFilter(this, 'TCP')">TCP</button>
      <button class="filter-btn" onclick="setFilter(this, 'UDP')">UDP</button>
      <button class="filter-btn" onclick="setFilter(this, 'ICMP')">ICMP</button>
      <div class="separator"></div>
      <button class="filter-btn" onclick="exportData('json')">↓ JSON</button>
      <button class="filter-btn" onclick="exportData('csv')">↓ CSV</button>
    </div>

    <!-- Graphiques -->
    <div class="chart-section">
      <div class="chart-card">
        <div class="chart-title">Protocol Distribution</div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--blue)">TCP</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barTcp"
              style="width: 0%; background: var(--blue)"
            ></div>
          </div>
          <span class="bar-count" id="countTcp">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--green)">UDP</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barUdp"
              style="width: 0%; background: var(--green)"
            ></div>
          </div>
          <span class="bar-count" id="countUdp">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--yellow)">ICMP</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barIcmp"
              style="width: 0%; background: var(--yellow)"
            ></div>
          </div>
          <span class="bar-count" id="countIcmp">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--purple)">OTHER</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barOther"
              style="width: 0%; background: var(--purple)"
            ></div>
          </div>
          <span class="bar-count" id="countOther">0</span>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Top Source IPs</div>
        <div id="topIps">
          <p style="color: var(--muted)">Waiting for data...</p>
        </div>
      </div>
    </div>

    <!-- Tableau -->
    <div class="table-container">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Source IP</th>
              <th>Destination IP</th>
              <th>Protocol</th>
              <th>Src Port</th>
              <th>Dst Port</th>
              <th>TTL</th>
            </tr>
          </thead>
          <tbody id="packetBody"></tbody>
        </table>
      </div>
    </div>

    <!-- JavaScript — mise à jour automatique -->
    <script>
      let currentFilter = "ALL";

      // Appeler l'API toutes les secondes
      setInterval(fetchData, 1000);

      async function fetchData() {
        // 1. Récupérer les stats
        const statsRes = await fetch("/api/stats");
        const stats = await statsRes.json();

        document.getElementById("statTotal").textContent = stats.total;
        document.getElementById("statTcp").textContent = stats.tcp;
        document.getElementById("statUdp").textContent = stats.udp;
        document.getElementById("statIcmp").textContent = stats.icmp;
        document.getElementById("statOther").textContent = stats.other;

        // 2. Mettre à jour les barres
        const total = stats.total || 1;
        updateBar("Tcp", stats.tcp, total);
        updateBar("Udp", stats.udp, total);
        updateBar("Icmp", stats.icmp, total);
        updateBar("Other", stats.other, total);

        // 3. Récupérer les paquets
        const packetsRes = await fetch(
          "/api/packets?protocol=" + currentFilter,
        );
        const packets = await packetsRes.json();

        // 4. Mettre à jour le tableau
        const tbody = document.getElementById("packetBody");
        tbody.innerHTML = "";
        packets.forEach((p) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
                    <td>${p.src_ip}</td>
                    <td>${p.dest_ip}</td>
                    <td><span class="tag tag-${p.protocol}">${p.protocol}</span></td>
                    <td>${p.src_port || "—"}</td>
                    <td>${p.dest_port || "—"}</td>
                    <td>${p.ttl}</td>
                `;
          tbody.appendChild(tr);
        });

        // 5. Top IPs
        const ipCount = {};
        packets.forEach((p) => {
          ipCount[p.src_ip] = (ipCount[p.src_ip] || 0) + 1;
        });
        const sorted = Object.entries(ipCount)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 8);
        const topDiv = document.getElementById("topIps");
        topDiv.innerHTML = sorted
          .map(
            ([ip, count]) =>
              `<div class="ip-row"><span>${ip}</span><span class="ip-count">${count}</span></div>`,
          )
          .join("");
      }

      function updateBar(name, count, total) {
        const pct = ((count / total) * 100).toFixed(1);
        document.getElementById("bar" + name).style.width = pct + "%";
        document.getElementById("count" + name).textContent = count;
      }

      function setFilter(btn, proto) {
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = proto;
      }

      function exportData(fmt) {
        window.open(
          "/api/export/" + fmt + "?protocol=" + currentFilter,
          "_blank",
        );
      }
    </script>
  </body>
</html>
