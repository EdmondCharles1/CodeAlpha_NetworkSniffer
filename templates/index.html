<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetScope — Network Sniffer</title>
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <h1>Net<span>Scope</span></h1>
      <div class="status">
        <div class="dot"></div>
        <span>CAPTURING</span>
      </div>
    </header>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="statTotal" style="color: var(--cyan)">
          0
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">TCP</div>
        <div class="stat-value" id="statTcp" style="color: var(--blue)">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">UDP</div>
        <div class="stat-value" id="statUdp" style="color: var(--green)">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">ICMP</div>
        <div class="stat-value" id="statIcmp" style="color: var(--yellow)">
          0
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Other</div>
        <div class="stat-value" id="statOther" style="color: var(--purple)">
          0
        </div>
      </div>
    </div>

    <!-- Filtres + Export -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter(this, 'ALL')">
        ALL
      </button>
      <button class="filter-btn" onclick="setFilter(this, 'TCP')">TCP</button>
      <button class="filter-btn" onclick="setFilter(this, 'UDP')">UDP</button>
      <button class="filter-btn" onclick="setFilter(this, 'ICMP')">ICMP</button>
      <div class="separator"></div>
      <button class="filter-btn" onclick="exportData('json')">↓ JSON</button>
      <button class="filter-btn" onclick="exportData('csv')">↓ CSV</button>
    </div>

    <!-- Graphiques -->
    <div class="chart-section">
      <div class="chart-card">
        <div class="chart-title">Protocol Distribution</div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--blue)">TCP</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barTcp"
              style="width: 0%; background: var(--blue)"
            ></div>
          </div>
          <span class="bar-count" id="countTcp">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--green)">UDP</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barUdp"
              style="width: 0%; background: var(--green)"
            ></div>
          </div>
          <span class="bar-count" id="countUdp">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--yellow)">ICMP</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barIcmp"
              style="width: 0%; background: var(--yellow)"
            ></div>
          </div>
          <span class="bar-count" id="countIcmp">0</span>
        </div>
        <div class="bar-row">
          <span class="bar-label" style="color: var(--purple)">OTHER</span>
          <div class="bar-track">
            <div
              class="bar-fill"
              id="barOther"
              style="width: 0%; background: var(--purple)"
            ></div>
          </div>
          <span class="bar-count" id="countOther">0</span>
        </div>
      </div>

      <div class="chart-card">
        <div class="chart-title">Top Source IPs</div>
        <div id="topIps">
          <p style="color: var(--muted)">Waiting for data...</p>
        </div>
      </div>
    </div>

    <!-- Tableau -->
    <div class="table-container">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Source IP</th>
              <th>Destination IP</th>
              <th>Protocol</th>
              <th>Src Port</th>
              <th>Dst Port</th>
              <th>TTL</th>
            </tr>
          </thead>
          <tbody id="packetBody"></tbody>
        </table>
      </div>
    </div>

    <script src="/static/js/app.js"></script>
  </body>
</html>
